# Example workflow for consumers.
# Copy this file to .github/workflows/netlify-agents.yml in your repository.
#
# Prerequisites:
#   1. Install the netlify-coding GitHub App on your repo
#   2. Add NETLIFY_AUTH_TOKEN and NETLIFY_SITE_ID as repository secrets
#
# Usage: mention @netlify in an issue, PR, or comment to trigger the agent.
#   @netlify Build a landing page with a hero section
#   @netlify claude Add dark mode support
#   @netlify codex Fix the mobile layout

name: Netlify Agents

on:
  workflow_dispatch:
    inputs:
      trigger_text:
        description: 'What should the agent build or change? (e.g. "Add a dark mode toggle")'
        required: true
        type: string
        default: '@netlify'
      actor:
        description: 'GitHub username to attribute this run to'
        required: true
        type: string
      model:
        description: 'AI model to use'
        required: false
        type: choice
        options:
          - codex
          - claude
          - gemini
        default: 'codex'
  pull_request_target:
    types: [opened, synchronize, reopened]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted, edited]
  issues:
    types: [opened, assigned, edited]
  issue_comment:
    types: [created, edited]

concurrency:
  group: netlify-${{ github.repository }}-${{ github.event.pull_request.number || github.event.issue.number || github.run_id }}
  cancel-in-progress: false

jobs:
  netlify-agent:
    # Skip bot senders to avoid burning Actions minutes
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (
        github.event.sender.login != 'github-actions[bot]' &&
        github.event.sender.login != 'netlify-coding[bot]' &&
        github.event.sender.login != 'netlify[bot]'
      )
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - uses: netlify-labs/agent-runner-action@v1
        with:
          netlify-auth-token: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          netlify-site-id: ${{ secrets.NETLIFY_SITE_ID }}
          # Optional settings:
          # default-model: 'codex'        # Default AI model (claude, codex, gemini)
          # manage-labels: 'false'        # Auto-create and apply labels
          # dry-run: 'false'              # Still runs Netlify Agent; skips commit/PR creation
          # preflight-only: 'false'       # Validate setup only; starts no agent runner
          # If both are true, preflight-only behavior wins.
          # preflight-only: 'true'        # Example: verify config/permissions and exit
          # dry-run: 'true'               # Example: run preview without committing changes
          # timeout-minutes: '10'         # Max wait for agent completion
          # netlify-cli-version: '24.8.1' # Netlify CLI version
          # timezone: 'America/Los_Angeles' # Timezone for rendered timestamps
          # debug: 'false'                # Enable debug logging
