name: CI

on:
  push:
    branches: [master]
    paths: ['src/**', 'action.yml', 'package.json', 'tsconfig.json']
  pull_request:
    paths: ['src/**', 'action.yml', 'package.json', 'tsconfig.json']

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: bun test src/*.test.js
      - run: bunx tsc --noEmit
